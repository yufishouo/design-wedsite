<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#323235" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet" />
    <meta name="description" content="大雋室內裝潢設計工作室作品總覽。探索我們為頂客雅居、三代同堂、寵物共居與學齡家庭打造的專屬空間故事。" />
    <title>空間故事 Works | 大雋室內裝潢設計工作室</title>
    <!-- OpenGraph -->
    <meta property="og:title" content="空間故事 | 大雋室內裝潢設計工作室">
    <meta property="og:description" content="探索我們為不同家庭打造的專屬空間故事。">
    <meta property="og:image" content="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80">
    <meta property="og:url" content="https://dajun-studio.com/portfolio">
    <meta property="og:type" content="website">
    <!-- CSS injected by main.js -->
    <style>
      /* Portfolio Specific Styles */
      .page-header {
        padding-top: 180px;
        padding-bottom: 80px;
        background-color: var(--color-primary-bg);
      }

      
      .portfolio-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        gap: 3rem 2rem;
        padding-bottom: 100px;
      }
      
      .portfolio-card img {
        height: 500px;
        width: 100%;
        object-fit: cover;
      }
      
      .portfolio-card-info {
        padding-top: 1.5rem;
      }

      @media (max-width: 768px) {
        .portfolio-grid { grid-template-columns: 1fr; gap: 2rem; }
        .page-header { padding-top: 120px; padding-bottom: 40px; }
        .filter-group { 
          flex-wrap: nowrap; 
          overflow-x: auto; 
          padding-bottom: 0.5rem; 
          -webkit-overflow-scrolling: touch;
        }
        /* Hide scrollbar for a cleaner look */
        .filter-group::-webkit-scrollbar { display: none; }
        .filter-group { -ms-overflow-style: none; scrollbar-width: none; }
      }
    </style>
  </head>
  <body data-header-theme="light">
    <div id="preloader" class="site-preloader">
      <div class="preloader-text">大雋室內裝潢設計工作室</div>
    </div>
    
    <main>
      <!-- Page Header -->
      <section class="page-header container">
        <h1 class="heading-large fade-up">空間故事<span class="page-header-en">Selected Works</span></h1>
        <p class="text-lead fade-up stagger-2" style="color: var(--color-muted); max-width: 620px; margin-top: 2rem;">每一個空間，都是一段生活的敘事。從頂客雅居到三代同堂，看我們如何以設計回應不同的人生風景。</p>
      </section>



      <!-- CMS Collection Grid -->
      <section class="container">
        <div id="portfolio-grid" class="portfolio-grid">
          <!-- Populated by JS -->
        </div>
      </section>

    </main>
    
    <!-- Scripts -->
    <script type="module">
      import '/src/main.js';
      import { initPortfolioCMS } from '/src/utils/cms.js';
      document.addEventListener('DOMContentLoaded', () => {
        initPortfolioCMS();
      });
    </script>
  </body>
</html>
