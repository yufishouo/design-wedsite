<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F4F3F0" />
    <meta name="description" content="大雋室內裝潢設計工作室作品總覽。探索我們為頂客雅居、三代同堂、寵物共居與學齡家庭打造的專屬空間故事。" />
    <title>空間故事 Works | 大雋室內裝潢設計工作室</title>
    <!-- OpenGraph -->
    <meta property="og:title" content="空間故事 | 大雋室內裝潢設計工作室">
    <meta property="og:description" content="探索我們為不同家庭打造的專屬空間故事。">
    <meta property="og:image" content="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80">
    <meta property="og:url" content="https://dajun-studio.com/portfolio">
    <meta property="og:type" content="website">
    <!-- CSS injected by main.js -->
    <style>
      /* Portfolio Specific Styles */
      .page-header {
        padding-top: 180px;
        padding-bottom: 80px;
        background-color: var(--color-primary-bg);
      }
      
      .filter-bar {
        position: sticky;
        top: var(--header-height);
        background-color: rgba(244, 243, 240, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 1rem 0;
        z-index: 99;
        border-bottom: 1px solid rgba(51, 51, 51, 0.1);
        margin-bottom: 4rem;
      }
      
      .filter-group {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      
      .filter-label {
        font-family: var(--font-heading);
        font-weight: 600;
        margin-right: 1rem;
        color: var(--color-accent);
      }
      
      .filter-btn {
        background: none;
        border: none;
        padding: 0.5rem 1rem;
        cursor: pointer;
        font-family: var(--font-body);
        color: var(--color-primary-text);
        transition: all 0.3s ease;
        border-radius: 4px;
      }
      
      .filter-btn:hover, .filter-btn.active {
        background-color: var(--color-primary-text);
        color: var(--color-primary-bg);
      }
      
      .portfolio-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        gap: 3rem 2rem;
        padding-bottom: 100px;
      }
      
      .portfolio-card img {
        height: 500px;
        width: 100%;
        object-fit: cover;
      }
      
      .portfolio-card-info {
        padding-top: 1.5rem;
      }

      @media (max-width: 768px) {
        .portfolio-grid { grid-template-columns: 1fr; gap: 2rem; }
        .page-header { padding-top: 120px; padding-bottom: 40px; }
        .filter-group { 
          flex-wrap: nowrap; 
          overflow-x: auto; 
          padding-bottom: 0.5rem; 
          -webkit-overflow-scrolling: touch;
        }
        /* Hide scrollbar for a cleaner look */
        .filter-group::-webkit-scrollbar { display: none; }
        .filter-group { -ms-overflow-style: none; scrollbar-width: none; }
      }
    </style>
  </head>
  <body data-header-theme="light">
    <div id="preloader" class="site-preloader">
      <div class="preloader-text">大雋室內裝潢設計工作室</div>
    </div>
    
    <main>
      <!-- Page Header -->
      <section class="page-header container">
        <h1 class="heading-large fade-up">空間故事<br><span style="color: var(--color-accent);">Works</span></h1>
      </section>

      <!-- Sticky Filter Bar -->
      <div class="filter-bar">
        <div class="container">
          <div class="filter-group">
            <span class="filter-label">生活型態</span>
            <button class="filter-btn active" data-filter-type="category" data-filter-value="all">全部</button>
            <button class="filter-btn" data-filter-type="category" data-filter-value="頂客雅居">頂客雅居</button>
            <button class="filter-btn" data-filter-type="category" data-filter-value="三代同堂">三代同堂</button>
            <button class="filter-btn" data-filter-type="category" data-filter-value="寵物共居">寵物共居</button>
            <button class="filter-btn" data-filter-type="category" data-filter-value="學齡家庭">學齡家庭</button>
          </div>
          <div class="filter-group">
            <span class="filter-label">坪數區間</span>
            <button class="filter-btn active" data-filter-type="size" data-filter-value="all">全部</button>
            <button class="filter-btn" data-filter-type="size" data-filter-value="20-40">20-40坪</button>
            <button class="filter-btn" data-filter-type="size" data-filter-value="40-60">40-60坪</button>
            <button class="filter-btn" data-filter-type="size" data-filter-value="60+">60坪以上</button>
          </div>
        </div>
      </div>

      <!-- CMS Collection Grid -->
      <section class="container">
        <div id="portfolio-grid" class="portfolio-grid">
          <!-- Populated by JS -->
        </div>
      </section>

    </main>
    
    <!-- Scripts -->
    <script type="module">
      import '/src/main.js';
      import { initPortfolioCMS } from '/src/utils/cms.js';
      document.addEventListener('DOMContentLoaded', () => {
        initPortfolioCMS();
      });
    </script>
  </body>
</html>
