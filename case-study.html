<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#323235" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet" />
    <meta name="description" content="深入了解大雋室內裝潢設計工作室的專案細節與設計思維。從空間破解到材質工法，見證我們如何化解居住痛點。" />
    <title>專案詳情 | 大雋室內裝潢設計工作室</title>
    <link rel="canonical" href="https://design-wedsite.vercel.app/case-study.html" />
    <!-- OpenGraph -->
    <meta property="og:title" content="專案詳情 | 大雋室內裝潢設計工作室">
    <meta property="og:description" content="深入了解大雋工作室的專案細節與設計思維。">
    <meta property="og:image" content="https://design-wedsite.vercel.app/images/daheliang/72891.jpg">
    <meta property="og:url" content="https://design-wedsite.vercel.app/case-study.html">
    <meta property="og:type" content="website">
    <!-- CSS injected by main.js -->
    <style>
      /* Critical: keep canvas dark before styles load */
      html { background-color: #323235; color-scheme: dark; }
      /* Case Study Specific Styles */
      .cs-hero {
        height: 100vh;
        min-height: 600px;
        position: relative;
        isolation: isolate;
        display: flex;
        align-items: flex-end;
        padding-bottom: 80px;
        color: var(--color-white);
      }
      .cs-hero-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
      }
      .cs-hero-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.8));
        z-index: -1;
      }
      /* Editorial Details Section (Abraham style) */
      .cs-editorial {
        padding: 100px 5%;
        background-color: var(--color-secondary-bg);
      }
      .cs-editorial-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 4rem;
        max-width: 1400px;
        margin: 0 auto;
      }
      .cs-editorial-meta h3 {
        color: var(--color-accent);
        font-family: var(--font-heading);
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
      .cs-editorial-meta p {
        margin-bottom: 2rem;
        font-size: 0.95rem;
      }
      .cs-editorial-main h2 {
        font-family: var(--font-heading);
        font-size: 2.5rem;
        margin-bottom: 2rem;
      }
      
      /* Vertical Image Stack (Chain10 style) */
      .cs-image-stack {
        display: flex;
        flex-direction: column;
        gap: 20vh; /* Generous whitespace */
        padding: 100px 5%;
        max-width: 1600px;
        margin: 0 auto;
      }
      .cs-stack-item {
        width: 100%;
        margin: 0;
      }
      .cs-stack-item img {
        width: 100%;
        height: auto;
        max-height: 85vh;
        object-fit: cover;
      }
      .cs-stack-caption {
        margin-top: 1.25rem;
        text-align: center;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        color: var(--color-muted);
      }

      @media (max-width: 768px) {
        .cs-editorial-grid {
          grid-template-columns: 1fr;
          gap: 2rem;
        }
        .cs-image-stack {
          gap: 10vh;
          padding: 60px 5%;
        }
      }
    </style>
  </head>
  <body data-header-theme="transparent">
    <div id="preloader" class="site-preloader">
      <div class="preloader-text">大雋室內裝潢設計工作室</div>
    </div>
    
    <main>
      <!-- Hero Image -->
      <section class="cs-hero fade-up">
        <img id="cs-hero-img" src="" alt="Project Hero" class="cs-hero-bg" />
        <div class="cs-hero-overlay"></div>
        <div class="container fade-up stagger-2">
          <span id="cs-meta" class="text-sm" style="color: var(--color-accent); letter-spacing: 0.1em;"></span>
          <h1 id="cs-title" class="heading-large" style="margin-top: 1rem;"></h1>
        </div>
      </section>

      <!-- Vertical Image Stack -->
      <section class="cs-image-stack" id="cs-gallery">
        <!-- Rendered by JS -->
      </section>

      <!-- Editorial Details (Moved to bottom) -->
      <section class="cs-editorial fade-up">
        <div class="cs-editorial-grid">
          <div class="cs-editorial-meta fade-up stagger-1">
            <h3>Challenge</h3>
            <p id="cs-challenge"></p>
          </div>
          <div class="cs-editorial-main fade-up stagger-2">
            <h2>設計理念</h2>
            <p id="cs-solution" class="text-lead"></p>
          </div>
        </div>
      </section>

      <!-- Next Project -->
      <section id="next-project-container">
        <!-- Rendered by JS -->
      </section>
      
    </main>
    
    <script type="module">
      import '/src/main.js';
      import { initCaseStudy } from '/src/utils/cms.js';
      import { initAnimations } from '/src/utils/animations.js';
      document.addEventListener('DOMContentLoaded', () => {
        initCaseStudy();
        setTimeout(() => initAnimations(), 100);
      });
    </script>
  </body>
</html>
